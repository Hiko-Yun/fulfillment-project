<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulfillment Pixel Corp</title>
    <style>
        /* Обнуляем отступы */
        * { margin: 0; padding: 0; box-box: border-box; }

        body {
            background-color: #1a1a1a; /* Темный фон для контраста */
            color: #fff;
            font-family: 'Courier New', Courier, monospace; /* Пиксельный стиль шрифта */
        }

        /* Контейнер для твоей интерактивной карты/гифки */
        .pixel-card {
            position: relative;
            width: 300px; /* Размер заглушки */
            height: 200px;
            margin: 50px auto;
            overflow: hidden; /* Чтобы зум оставался внутри рамки */
            border: 4px solid #fff;
            cursor: pointer;
        }

        .pixel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
            /* МАГИЯ ПИКСЕЛЕЙ */
            image-rendering: pixelated;
            
            /* Плавность анимации */
            transition: transform 0.3s ease;
        }

        /* Эффект при наведении */
        .pixel-card:hover img {
            transform: scale(1.5); /* Увеличиваем в 1.5 раза */
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .pixel-card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 20px;">ГЛАВНЫЙ СКЛАД</h1>

    <div class="pixel-card">
        <img src="https://via.placeholder.com/150/0000FF/808080?text=PIXEL+ART" alt="Pixel Art Warehouse">
    </div>

</body>
</html>
